server:
  port: 8081
spring:
  cloud:
    gateway:
      routes:
        - id: services
          uri: ${BACKEND_URL:http://localhost:8080}
          predicates:
            - Path=/services/**

        - id: websocket
          uri: ${BACKEND_URL:http://localhost:8080}
          predicates:
            - Path=/services/socket/**

        - id: app
          uri: ${APP_URL:http://localhost:8080}
          predicates:
            - Path=/*

        - id: app-assets
          uri: ${APP_URL:http://localhost:8080}
          predicates:
            - Path=/assets/**
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    reactor.netty.http.server: DEBUG